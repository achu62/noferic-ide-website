<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noferic-IDE</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <nav class="topnav" aria-label="Primary navigation">
            <button class="nav-btn active" data-view="home" type="button">Home</button>
            <button class="nav-btn" data-view="news" type="button">News</button>
        </nav>
    </header>

    <main class="page-shell">
        <section id="home-view" class="view-section hero active">
            <div class="hero-copy">
                <h1>Noferic-IDE</h1>
                <p class="subtitle">
                    An open-source web IDE built with web technologies.
                </p>

                <div class="hero-actions">
                    <a href="https://github.com/achu62/noferic-IDE/releases" class="download-btn">
                        Download Latest versions
                    </a>
                </div>

                <div class="hero-meta">
                    <p class="version-pill">Version <span id="version-value">Loading…</span></p>
                </div>

                <div class="preview-card">
                    <img id="image-space" class="image-grid" alt="Noferic-IDE preview">
                </div>
            </div>
        </section>

        <section id="news-view" class="view-section news-view" hidden>
            <div class="news-shell">
                <div class="news-header">
                    <div>
                        <p class="news-kicker">Latest updates</p>
                        <h2>News</h2>
                    </div>
                </div>
                <div id="news-list" class="news-list"></div>
            </div>
        </section>
    </main>

    <div id="news-modal" class="news-modal" hidden>
        <div class="news-modal-backdrop"></div>
        <div class="news-modal-content" role="dialog" aria-modal="true" aria-labelledby="news-modal-title">
            <button class="news-modal-close" aria-label="Close news">×</button>
            <div class="news-modal-body">
                <p class="news-kicker">News detail</p>
                <h3 id="news-modal-title"></h3>
                <p id="news-modal-text"></p>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
